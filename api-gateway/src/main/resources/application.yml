spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: ms-ubicacion
              uri: lb://ms-ubicacion
              predicates:
                - Path=/api/ubicaciones/**

            - id: ms-estacionamiento
              uri: lb://ms-estacionamiento
              predicates:
                - Path=/api/estacionamientos/**

            - id: ms-usuario
              uri: https://agile-motivation-production-edd0.up.railway.app
              predicates:
                - Path=/api/usuarios/**

            - id: ms-pago
              uri: lb://ms-pago
              predicates:
                - Path=/api/pagos/**

            - id: ms-pago-tipos
              uri: lb://ms-pago
              predicates:
                - Path=/api/tipos-pago/**

            - id: ms-reserva
              uri: lb://ms-reserva
              predicates:
                - Path=/api/reservas/**

            - id: ms-notificacion
              uri: lb://ms-notificacion
              predicates:
                - Path=/api/notificaciones/**

            - id: ms-revision
              uri: lb://ms-revision
              predicates:
                - Path=/api/revisiones/**

            - id: ms-admin
              uri: lb://ms-admin
              predicates:
                - Path=/api/admins/**

            - id: ms-auth
              uri: https://caring-healing-production-66e9.up.railway.app
              predicates:
               - Path=/api/auth/**

            - id: ms-vehiculo
              uri: lb://ms-vehiculo
              predicates:
                - Path=/api/vehiculos/**

server:
  port: 8080

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true